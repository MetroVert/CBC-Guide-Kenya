kind = "web"
previewPath = "/"
title = "CBC Guide Kenya"
version = "1.0.0"
id = "artifacts/cbc-guide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21154

[services.development]
run = "pnpm --filter @workspace/cbc-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cbc-guide", "run", "build" ]
publicDir = "artifacts/cbc-guide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21154"
BASE_PATH = "/"
